# Server
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/gotokart?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&authenticationPlugin=caching_sha2_password
spring.datasource.username=root
spring.datasource.password=Root@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Connection pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# JSON
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# JWT
jwt.secret=GoToKartSuperSecretJwtKey2026!!VeryLongAndSecure@#$%
jwt.expiry-ms=86400000

# Suppress auto-config warnings
spring.security.user.password=unused
spring.jpa.open-in-view=false

# AWS S3 (product images)
# Credentials come from EC2 instance role in prod and ~/.aws/credentials locally.
# Never put aws.accessKey / aws.secretKey here.
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:gotokart-product-images-035379289330-us-east-1-an}
aws.s3.public-base-url=${AWS_S3_PUBLIC_BASE_URL:}
aws.s3.presign-ttl-seconds=${AWS_S3_PRESIGN_TTL_SECONDS:300}

# Multipart limits — keep low; bytes go to S3 directly, not through this app
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB
